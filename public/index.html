<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Foodiegram</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* ------------------------------------------------------------------ */
    /* Design tokens                                                        */
    /* ------------------------------------------------------------------ */
    :root {
      --primary:    #2563eb;
      --primary-dk: #1d4ed8;
      --accent:     #764ba2;
      --surface:    #ffffff;
      --bg:         #f3f4f6;
      --border:     #e5e7eb;
      --text:       #1f2937;
      --text-muted: #6b7280;
      --danger:     #ef4444;
      --warning:    #f59e0b;
      --radius:     10px;
      --shadow-sm:  0 1px 3px rgba(0,0,0,.1), 0 1px 2px rgba(0,0,0,.06);
      --shadow-md:  0 4px 16px rgba(0,0,0,.10), 0 2px 4px rgba(0,0,0,.06);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --surface:    #1f2937;
        --bg:         #111827;
        --border:     #374151;
        --text:       #f9fafb;
        --text-muted: #9ca3af;
        --shadow-sm:  0 1px 3px rgba(0,0,0,.4), 0 1px 2px rgba(0,0,0,.3);
        --shadow-md:  0 4px 16px rgba(0,0,0,.4), 0 2px 4px rgba(0,0,0,.3);
      }
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
           background: var(--bg); color: var(--text); line-height: 1.5; }

    /* ------------------------------------------------------------------ */
    /* Error banner                                                         */
    /* ------------------------------------------------------------------ */
    #error-banner {
      position: sticky; top: 0; z-index: 100;
      background: #fef2f2; border-bottom: 1px solid #fca5a5;
      color: #991b1b; padding: .75rem 1rem;
      text-align: center; font-size: .9rem;
    }

    /* ------------------------------------------------------------------ */
    /* Nav                                                                  */
    /* ------------------------------------------------------------------ */
    .nav {
      background: var(--surface); border-bottom: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      display: flex; align-items: center; justify-content: space-between;
      padding: .75rem 1.5rem; position: sticky; top: 0; z-index: 50;
    }
    .nav-brand { font-size: 1.2rem; font-weight: 700; color: var(--text); text-decoration: none; }
    .nav-links  { display: flex; gap: .5rem; }
    .nav-link {
      padding: .4rem .9rem; border-radius: 6px; font-size: .9rem;
      text-decoration: none; color: var(--text-muted);
      transition: background .15s, color .15s; cursor: pointer;
    }
    .nav-link:hover             { background: var(--bg); color: var(--text); }
    .nav-link.nav-link--active  { background: var(--primary); color: #fff; }
    .nav-link--disabled         { opacity: .45; cursor: default; font-style: italic; }

    /* ------------------------------------------------------------------ */
    /* Page container & views                                              */
    /* ------------------------------------------------------------------ */
    .page { max-width: 1200px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }
    [hidden] { display: none !important; }

    /* ------------------------------------------------------------------ */
    /* Browse view — search + filters                                       */
    /* ------------------------------------------------------------------ */
    .search-bar {
      display: flex; gap: .5rem; margin-bottom: 1rem;
    }
    .search-bar input {
      flex: 1; padding: .6rem 1rem; border: 2px solid var(--border);
      border-radius: var(--radius); font-size: 1rem;
      transition: border-color .2s, box-shadow .2s;
    }
    .search-bar input:focus {
      outline: none; border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37,99,235,.15);
    }

    .filters {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1rem;
      margin-bottom: 1.25rem; display: flex; flex-direction: column; gap: .75rem;
    }
    .filter-group { display: flex; flex-wrap: wrap; align-items: center; gap: .35rem; }
    .filter-group__label {
      font-size: .75rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: .05em; color: var(--text-muted);
      white-space: nowrap; margin-right: .25rem; min-width: 80px;
    }
    .pill {
      padding: .3rem .75rem; border-radius: 20px; font-size: .8rem;
      border: 1px solid var(--border); background: var(--surface);
      cursor: pointer; transition: all .15s; user-select: none; white-space: nowrap;
    }
    .pill:hover { background: var(--bg); border-color: #9ca3af; }
    .pill.pill--active {
      background: var(--primary); color: #fff;
      border-color: var(--primary); box-shadow: 0 2px 8px rgba(37,99,235,.3);
    }
    .filters-clear {
      font-size: .8rem; color: var(--primary); cursor: pointer;
      background: none; border: none; padding: 0; align-self: flex-start;
    }
    .filters-clear:hover { text-decoration: underline; }

    /* ------------------------------------------------------------------ */
    /* Recipe grid                                                          */
    /* ------------------------------------------------------------------ */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.25rem;
    }
    .recipe-card {
      cursor: pointer; box-shadow: var(--shadow-sm);
    }
    .recipe-card:hover { box-shadow: var(--shadow-md); }

    .card-img {
      height: 180px; overflow: hidden; background: var(--bg);
      position: relative;
    }
    .card-img img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform .4s ease;
    }
    .recipe-card:hover .card-img img { transform: scale(1.05); }
    .img-placeholder {
      width: 100%; height: 100%;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex; align-items: center; justify-content: center;
      font-size: 3.5rem; color: rgba(255,255,255,.9); font-weight: 700;
    }

    .card-body { padding: 1rem; display: flex; flex-direction: column; gap: .5rem; }
    .card-title {
      font-size: 1rem; font-weight: 600; color: var(--text);
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden; line-height: 1.4;
    }
    .card-badges { display: flex; flex-wrap: wrap; gap: .35rem; align-items: center; }
    .card-tags   { display: flex; flex-wrap: wrap; gap: .25rem; }

    .badge {
      display: inline-block; padding: .2rem .55rem;
      font-size: .72rem; font-weight: 500; border-radius: 5px;
      text-transform: capitalize;
    }
    .badge-cuisine    { background: #ede9fe; color: #5b21b6; }
    .badge-difficulty { background: #f3f4f6; color: #374151; }
    .badge-meal       { background: #fef3c7; color: #92400e; }
    .badge-inspiration {
      background: #fff7ed; color: #9a3412;
      border: 1px solid #fed7aa; font-style: italic;
    }

    .fav-btn {
      margin-left: auto; background: none; border: none;
      font-size: 1.25rem; cursor: pointer; line-height: 1;
      padding: 2px; transition: transform .2s;
      color: var(--text-muted);
    }
    .fav-btn:hover           { transform: scale(1.3); }
    .fav-btn.fav-btn--active { color: var(--warning); }

    /* ------------------------------------------------------------------ */
    /* Empty / loading states                                               */
    /* ------------------------------------------------------------------ */
    .state-msg {
      text-align: center; padding: 3rem 1rem; color: var(--text-muted);
    }
    .state-msg__icon { font-size: 3rem; margin-bottom: .5rem; }
    .state-msg__text { font-size: 1rem; }

    /* ------------------------------------------------------------------ */
    /* Detail view                                                          */
    /* ------------------------------------------------------------------ */
    .detail-back {
      background: none; border: 1px solid var(--border); border-radius: 6px;
      padding: .4rem .9rem; cursor: pointer; font-size: .9rem;
      display: inline-flex; align-items: center; gap: .35rem;
      color: var(--text-muted); margin-bottom: 1.25rem;
      transition: background .15s, color .15s;
    }
    .detail-back:hover { background: var(--bg); color: var(--text); }

    .detail-hero {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
      margin-bottom: 1.5rem; box-shadow: var(--shadow-sm);
    }
    .detail-hero-img {
      width: 100%; max-height: 360px; object-fit: cover; display: block;
    }
    .detail-hero-body { padding: 1.25rem 1.5rem; }
    .detail-title {
      font-size: 1.6rem; font-weight: 700; color: var(--text); margin-bottom: .75rem;
    }
    .detail-meta { display: flex; flex-wrap: wrap; gap: .5rem; margin-bottom: .75rem; }
    .detail-actions { display: flex; align-items: center; gap: .75rem; flex-wrap: wrap; }

    .btn {
      display: inline-flex; align-items: center; gap: .4rem;
      padding: .45rem 1rem; border-radius: 7px; font-size: .9rem;
      font-weight: 500; cursor: pointer; border: none; transition: all .15s;
      text-decoration: none;
    }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-dk); }
    .btn-ghost  { background: none; border: 1px solid var(--border); color: var(--text-muted); }
    .btn-ghost:hover { background: var(--bg); color: var(--text); }
    .btn-fav    { background: none; border: 1px solid var(--border); font-size: 1rem; }
    .btn-fav.active { border-color: var(--warning); color: var(--warning); background: #fffbeb; }

    /* ------------------------------------------------------------------ */
    /* Two-column detail layout                                             */
    /* ------------------------------------------------------------------ */
    .detail-cols {
      display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem;
      align-items: start;
    }
    @media (max-width: 680px) { .detail-cols { grid-template-columns: 1fr; } }

    .detail-section {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.25rem;
      box-shadow: var(--shadow-sm);
    }
    .detail-section + .detail-section { margin-top: 1.25rem; }
    .section-title {
      font-size: 1rem; font-weight: 600; color: var(--text);
      margin-bottom: .9rem; padding-bottom: .5rem;
      border-bottom: 1px solid var(--border);
    }

    /* Scaling widget */
    .tabs { display: flex; gap: 0; margin-bottom: 1rem; border-radius: 7px; overflow: hidden; border: 1px solid var(--border); }
    .tab-btn {
      flex: 1; padding: .45rem .75rem; background: var(--bg);
      border: none; font-size: .85rem; cursor: pointer;
      transition: background .15s, color .15s; color: var(--text-muted);
    }
    .tab-btn:first-child { border-right: 1px solid var(--border); }
    .tab-btn.tab-btn--active { background: var(--primary); color: #fff; }

    .tab-panel { display: none; }
    .tab-panel.tab-panel--active { display: block; }

    .scale-row { display: flex; gap: .5rem; align-items: center; margin-bottom: .75rem; flex-wrap: wrap; }
    .scale-row label { font-size: .85rem; color: var(--text-muted); white-space: nowrap; }
    .scale-row input, .scale-row select {
      flex: 1; min-width: 80px; padding: .4rem .6rem;
      border: 1px solid var(--border); border-radius: 6px; font-size: .9rem;
    }
    .scale-row input:focus, .scale-row select:focus {
      outline: none; border-color: var(--primary);
    }
    .scale-info {
      font-size: .8rem; color: var(--text-muted); margin-bottom: .75rem;
    }
    .scale-factor-badge {
      display: inline-block; padding: .2rem .5rem;
      background: #eff6ff; border-radius: 5px; font-weight: 600;
      color: var(--primary); font-size: .8rem; margin-left: .35rem;
    }

    .ingredient-list { list-style: disc; padding-left: 1.4rem; }
    .ingredient-list li {
      padding: .35rem .25rem; border-radius: 4px; font-size: .9rem;
      transition: background .15s;
    }
    .ingredient-list li:hover { background: var(--bg); }
    .ingredient-list li.scaled { color: var(--primary); font-weight: 500; }

    .instruction-list { list-style: none; counter-reset: steps; }
    .instruction-list li {
      counter-increment: steps; padding: .6rem .5rem .6rem 2.5rem;
      position: relative; font-size: .9rem; border-radius: 6px;
      transition: background .15s; line-height: 1.55;
    }
    .instruction-list li::before {
      content: counter(steps); position: absolute; left: .5rem; top: .6rem;
      width: 1.5rem; height: 1.5rem; background: var(--primary);
      color: #fff; border-radius: 50%; display: flex;
      align-items: center; justify-content: center;
      font-size: .72rem; font-weight: 700; line-height: 1;
    }
    .instruction-list li:hover { background: var(--bg); }

    .notes-area {
      width: 100%; min-height: 80px; max-height: 220px;
      padding: .6rem .75rem; border: 1px solid var(--border);
      border-radius: 7px; font-size: .9rem; font-family: inherit;
      resize: vertical; line-height: 1.5;
      transition: border-color .2s;
    }
    .notes-area:focus { outline: none; border-color: var(--primary); }
    .notes-status {
      font-size: .75rem; color: var(--text-muted); margin-top: .3rem; height: 1rem;
    }

    /* Tags in detail */
    .detail-tags { display: flex; flex-wrap: wrap; gap: .35rem; }

    /* Times grid (Prep / Cook / Total) */
    .times-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: .5rem; margin-bottom: .9rem;
    }
    .times-cell {
      text-align: center; padding: .55rem .25rem;
      background: var(--bg); border-radius: 7px;
    }
    .times-cell__label {
      font-size: .68rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: .05em; color: var(--text-muted); margin-bottom: .2rem;
    }
    .times-cell__value { font-size: .9rem; font-weight: 500; color: var(--text); }
    .times-cell__value--unknown { color: var(--text-muted); font-style: italic; font-weight: 400; }

    /* Meta row (label + value inline) */
    .meta-row {
      display: flex; align-items: center; gap: .6rem; margin-bottom: .6rem;
    }
    .meta-row__label {
      font-size: .75rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: .05em; color: var(--text-muted); white-space: nowrap; min-width: 80px;
    }
    .meta-row__value { font-size: .9rem; color: var(--text); }

    /* Tag label groups (Proteins / Veg / Grains / Herbs, Dietary, etc.) */
    .tag-label-group { margin-bottom: .8rem; }
    .tag-label-group:last-child { margin-bottom: 0; }
    .tag-label-group__label {
      font-size: .68rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: .05em; color: var(--text-muted); margin-bottom: .35rem;
    }
    .tag-label-group__tags { display: flex; flex-wrap: wrap; gap: .3rem; }

    /* Collapsible original caption */
    .caption-details { }
    .caption-details > summary {
      font-size: .9rem; font-weight: 600; cursor: pointer;
      list-style: none; display: flex; align-items: center; gap: .4rem;
      color: var(--text-muted); padding: .1rem 0; user-select: none;
    }
    .caption-details > summary::-webkit-details-marker { display: none; }
    .caption-details > summary::before {
      content: '▶'; font-size: .6rem; transition: transform .2s; flex-shrink: 0;
    }
    .caption-details[open] > summary::before { transform: rotate(90deg); }
    .caption-text {
      font-size: .85rem; color: var(--text-muted); white-space: pre-wrap;
      line-height: 1.65; margin-top: .75rem;
      border-top: 1px solid var(--border); padding-top: .75rem;
    }

    /* No-instructions fallback */
    .no-instructions {
      font-size: .9rem; color: var(--text-muted);
    }
    .no-instructions a { color: var(--primary); }

    /* ------------------------------------------------------------------ */
    /* Responsive tweaks                                                    */
    /* ------------------------------------------------------------------ */
    @media (max-width: 600px) {
      .nav { padding: .6rem 1rem; }
      .detail-title { font-size: 1.3rem; }
      .grid { grid-template-columns: 1fr 1fr; gap: .75rem; }
    }
    @media (max-width: 400px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- ====================================================================
     Error banner (shown when API is unreachable)
     ==================================================================== -->
<div id="error-banner" hidden>
  ⚠️ Could not load recipes — is the server running?
</div>

<!-- ====================================================================
     Navigation
     ==================================================================== -->
<nav class="nav">
  <span class="nav-brand">🍳 Foodiegram</span>
  <div class="nav-links">
    <a id="nav-browse"      class="nav-link" href="#browse">Browse</a>
    <a id="nav-favourites"  class="nav-link" href="#favourites">Favourites</a>
    <span class="nav-link nav-link--disabled" title="Coming soon">Meal Planner</span>
  </div>
</nav>

<!-- ====================================================================
     View: Browse
     ==================================================================== -->
<div id="view-browse" class="page" hidden>
  <div class="search-bar">
    <input id="search-input" type="search" placeholder="Search recipes by title or ingredient…" autocomplete="off">
  </div>

  <div class="filters" id="filter-panel">
    <div class="filter-group" id="filter-cuisine">
      <span class="filter-group__label">Cuisine</span>
    </div>
    <div class="filter-group" id="filter-meal">
      <span class="filter-group__label">Meal</span>
    </div>
    <div class="filter-group" id="filter-difficulty">
      <span class="filter-group__label">Difficulty</span>
    </div>
    <div class="filter-group" id="filter-diet">
      <span class="filter-group__label">Dietary</span>
    </div>
    <button class="filters-clear" id="filters-clear-btn">Clear filters</button>
  </div>

  <div id="browse-grid" class="grid"></div>
  <div id="browse-state" class="state-msg" hidden>
    <div class="state-msg__icon">🔍</div>
    <div class="state-msg__text">No recipes match your filters.</div>
  </div>
</div>

<!-- ====================================================================
     View: Favourites
     ==================================================================== -->
<div id="view-favourites" class="page" hidden>
  <h2 style="margin-bottom:1rem;font-size:1.3rem;">⭐ Favourites</h2>
  <div id="fav-grid" class="grid"></div>
  <div id="fav-state" class="state-msg" hidden>
    <div class="state-msg__icon">🤍</div>
    <div class="state-msg__text">No favourites yet — star a recipe to save it here.</div>
  </div>
</div>

<!-- ====================================================================
     View: Recipe detail
     ==================================================================== -->
<div id="view-recipe" class="page" hidden>
  <button class="detail-back" id="detail-back">← Back</button>
  <div id="detail-content"></div>
</div>

<script type="module">
// =============================================================================
// Constants
// =============================================================================

// '' = same origin — FastAPI serves both the API and this file.
// Change to 'http://localhost:8000' only if you serve the HTML separately.
const API_BASE = '';
const DEBOUNCE_MS = 300;

// =============================================================================
// Scaling helpers (pure, no DOM)
// =============================================================================

/**
 * Extract the first numeric value from a string, or null.
 * @param {string} str
 * @returns {number|null}
 */
function extractNumber(str) {
  const m = str.match(/(\d+\.?\d*)/);
  return m ? parseFloat(m[1]) : null;
}

/**
 * Scale every numeric quantity in raw by factor, rounded to 2 dp.
 * Returns raw unchanged if it contains no number.
 * @param {string} raw
 * @param {number} factor
 * @returns {string}
 */
function scaleIngredient(raw, factor) {
  if (factor === 1) return raw;
  return raw.replace(/(\d+\.?\d*)/g, (match) => {
    const scaled = Math.round(parseFloat(match) * factor * 100) / 100;
    return String(scaled);
  });
}

// =============================================================================
// HTML helpers
// =============================================================================

function esc(str) {
  return String(str ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

/** Called from onerror on broken images — swaps the img for a placeholder. */
window._imgErr = function (el) {
  const div = document.createElement('div');
  div.className = 'img-placeholder';
  div.textContent = el.dataset.initial || '?';
  el.parentNode.replaceChild(div, el);
};

function renderImg(recipe) {
  const src = recipe.cloudinary_url || recipe.thumbnail_url;
  const initial = (recipe.title || '?').charAt(0).toUpperCase();
  if (src) {
    return `<img src="${esc(src)}" alt="${esc(recipe.title)}"
               data-initial="${esc(initial)}" onerror="_imgErr(this)">`;
  }
  return `<div class="img-placeholder">${esc(initial)}</div>`;
}

// =============================================================================
// State
// =============================================================================

const state = {
  /** @type {Object[]} */   allRecipes:    [],  // first full load, used for filter pills
  /** @type {string} */     activeView:    'browse',
  /** @type {Object} */     filters:       { q: '', cuisine: '', meal_type: '', difficulty: '', dietary_tag: '' },
  /** @type {Object|null}*/ currentRecipe: null,
};

// =============================================================================
// API
// =============================================================================

async function apiFetch(path, opts = {}) {
  const res = await fetch(API_BASE + path, {
    headers: { 'Content-Type': 'application/json' },
    ...opts,
  });
  if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
  return res.json();
}

async function getRecipes(params = {}) {
  const qs = new URLSearchParams();
  Object.entries(params).forEach(([k, v]) => { if (v) qs.set(k, v); });
  qs.set('limit', '500');
  return apiFetch(`/recipes?${qs}`);
}

async function getRecipe(code) {
  return apiFetch(`/recipes/${code}`);
}

async function patchRecipe(code, body) {
  return apiFetch(`/recipes/${code}`, {
    method: 'PATCH',
    body: JSON.stringify(body),
  });
}

// =============================================================================
// Router
// =============================================================================

function showView(id) {
  ['view-browse', 'view-recipe', 'view-favourites'].forEach(v => {
    document.getElementById(v).hidden = (v !== id);
  });
  document.getElementById('nav-browse').classList.toggle('nav-link--active', id === 'view-browse');
  document.getElementById('nav-favourites').classList.toggle('nav-link--active', id === 'view-favourites');
}

async function handleRoute() {
  const hash = window.location.hash || '#browse';
  try {
    if (hash.startsWith('#recipe/')) {
      const code = hash.slice(8);
      showView('view-recipe');
      await loadRecipeDetail(code);
    } else if (hash === '#favourites') {
      showView('view-favourites');
      await loadFavourites();
    } else {
      showView('view-browse');
      await loadBrowse();
    }
  } catch (err) {
    showError();
    console.error(err);
  }
}

// =============================================================================
// Browse view
// =============================================================================

/** Populate filter pills from the full recipe list (once). */
function buildFilterPills(recipes) {
  const sets = {
    cuisine:    new Set(),
    meal_type:  new Set(),
    difficulty: new Set(),
    diet:       new Set(),
  };
  recipes.forEach(r => {
    if (r.cuisine_type && r.cuisine_type !== 'unknown')    sets.cuisine.add(r.cuisine_type);
    if (r.meal_type    && r.meal_type    !== 'unknown')    sets.meal_type.add(r.meal_type);
    if (r.difficulty   && r.difficulty   !== 'unknown')    sets.difficulty.add(r.difficulty);
    (r.dietary_tags || []).forEach(t => sets.diet.add(t));
  });

  const render = (containerId, values, filterKey) => {
    const container = document.getElementById(containerId);
    // keep the label span, remove old pills
    const label = container.querySelector('.filter-group__label');
    container.innerHTML = '';
    container.appendChild(label);
    [...values].sort().forEach(v => {
      const pill = document.createElement('button');
      pill.className = 'pill';
      pill.textContent = v.replace(/_/g, ' ');
      pill.dataset.filter = filterKey;
      pill.dataset.value  = v;
      container.appendChild(pill);
    });
  };

  render('filter-cuisine',    sets.cuisine,    'cuisine');
  render('filter-meal',       sets.meal_type,  'meal_type');
  render('filter-difficulty', sets.difficulty, 'difficulty');
  render('filter-diet',       sets.diet,       'dietary_tag');
}

function syncPillState() {
  document.querySelectorAll('.pill').forEach(pill => {
    const key = pill.dataset.filter;
    pill.classList.toggle('pill--active', state.filters[key] === pill.dataset.value);
  });
}

async function loadBrowse() {
  const grid  = document.getElementById('browse-grid');
  const empty = document.getElementById('browse-state');
  grid.innerHTML = '<div class="state-msg"><div class="state-msg__icon">🍳</div><div class="state-msg__text">Loading…</div></div>';
  empty.hidden = true;

  const recipes = await getRecipes(state.filters);

  if (state.allRecipes.length === 0) {
    state.allRecipes = recipes;
    buildFilterPills(recipes);
  }
  syncPillState();

  if (recipes.length === 0) {
    grid.innerHTML = '';
    empty.hidden = false;
  } else {
    grid.innerHTML = recipes.map(cardHTML).join('');
    empty.hidden = true;
  }
}

async function loadFavourites() {
  const grid  = document.getElementById('fav-grid');
  const empty = document.getElementById('fav-state');
  grid.innerHTML = '<div class="state-msg"><div class="state-msg__icon">🍳</div><div class="state-msg__text">Loading…</div></div>';
  empty.hidden = true;

  const recipes = await getRecipes({ is_favorite: 'true' });

  if (recipes.length === 0) {
    grid.innerHTML = '';
    empty.hidden = false;
  } else {
    grid.innerHTML = recipes.map(cardHTML).join('');
    empty.hidden = true;
  }
}

function cardHTML(recipe) {
  const favActive = recipe.is_favorite ? 'fav-btn--active' : '';
  const favSymbol = recipe.is_favorite ? '★' : '☆';

  const isUntitled = !recipe.title || recipe.title === 'None';
  const titleHTML = isUntitled
    ? '<em style="color:var(--text-muted);font-weight:400">Untitled recipe</em>'
    : esc(recipe.title);

  const dietaryTags = recipe.dietary_tags || [];
  const shownTags = dietaryTags.slice(0, 2)
    .map(t => `<span class="tag tag-dietary">${esc(t.replace(/_/g,' '))}</span>`)
    .join('');
  const moreBadge = dietaryTags.length > 2
    ? `<span class="tag" style="background:var(--bg);color:var(--text-muted)">+${dietaryTags.length - 2} more</span>`
    : '';

  return `
    <article class="recipe-card" data-code="${esc(recipe.code)}">
      <div class="card-img">${renderImg(recipe)}</div>
      <div class="card-body">
        <div class="card-badges">
          <h3 class="card-title" style="flex:1;margin:0">${titleHTML}</h3>
          <button class="fav-btn ${favActive}"
                  data-action="toggle-fav" data-code="${esc(recipe.code)}"
                  title="${recipe.is_favorite ? 'Remove from favourites' : 'Add to favourites'}">
            ${favSymbol}
          </button>
        </div>
        <div class="card-badges">
          ${recipe.cuisine_type  && recipe.cuisine_type  !== 'unknown' ? `<span class="badge badge-cuisine">${esc(recipe.cuisine_type.replace(/_/g,' '))}</span>`  : ''}
          ${recipe.difficulty    && recipe.difficulty    !== 'unknown' ? `<span class="badge badge-difficulty">${esc(recipe.difficulty)}</span>`  : ''}
          ${recipe.meal_type     && recipe.meal_type     !== 'unknown' ? `<span class="badge badge-meal">${esc(recipe.meal_type.replace(/_/g,' '))}</span>` : ''}
        </div>
        <div class="card-tags">
          ${shownTags}${moreBadge}
        </div>
      </div>
    </article>`;
}

// =============================================================================
// Recipe detail view
// =============================================================================

async function loadRecipeDetail(code) {
  const container = document.getElementById('detail-content');
  container.innerHTML = '<div class="state-msg"><div class="state-msg__icon">🍳</div><div class="state-msg__text">Loading…</div></div>';

  const recipe = await getRecipe(code);
  state.currentRecipe = recipe;
  renderRecipeDetail(recipe);
}

function renderRecipeDetail(recipe) {
  const container = document.getElementById('detail-content');

  /* --- hero image --- */
  const heroSrc = recipe.cloudinary_url || recipe.thumbnail_url;
  const titleDisplay = !recipe.title || recipe.title === 'None' ? 'Untitled recipe' : recipe.title;
  const heroImg = heroSrc
    ? `<img class="detail-hero-img" src="${esc(heroSrc)}"
           alt="${esc(titleDisplay)}" data-initial="${esc(titleDisplay.charAt(0))}"
           onerror="this.style.display='none'">`
    : '';

  /* --- meta badges (hero) --- */
  const metaBadges = [
    recipe.cuisine_type  !== 'unknown' && recipe.cuisine_type  ? `<span class="badge badge-cuisine">${esc(recipe.cuisine_type.replace(/_/g,' '))}</span>` : '',
    recipe.difficulty    !== 'unknown' && recipe.difficulty    ? `<span class="badge badge-difficulty">${esc(recipe.difficulty)}</span>` : '',
    recipe.meal_type     !== 'unknown' && recipe.meal_type     ? `<span class="badge badge-meal">${esc(recipe.meal_type.replace(/_/g,' '))}</span>` : '',
    recipe.dish_type     !== 'unknown' && recipe.dish_type     ? `<span class="badge" style="background:#f0fdf4;color:#166534">${esc(recipe.dish_type.replace(/_/g,' '))}</span>` : '',
  ].filter(Boolean).join('');

  /* --- inspiration-only guard --- */
  const isInspirationOnly = recipe.is_recipe === false || (recipe.confidence != null && recipe.confidence < 0.4);
  const inspirationBadge = isInspirationOnly
    ? `<span class="badge badge-inspiration">✦ Inspiration only — limited detail</span>`
    : '';

  /* --- scaling widget (hidden for inspiration-only posts) --- */
  const parseableIngs = (recipe.ingredients || []).filter(i => extractNumber(i) !== null);
  const ingOptions = parseableIngs.map(i =>
    `<option value="${esc(i)}">${esc(i.length > 60 ? i.slice(0, 57) + '…' : i)}</option>`
  ).join('');
  const baseServingsInfo = recipe.base_servings != null
    ? `Base: <strong>${recipe.base_servings}</strong> servings`
    : `<em>Servings unknown — ingredient scaling still available</em>`;

  /* --- instructions --- */
  const instructions = (recipe.instructions || []).length > 0
    ? `<ol class="instruction-list">${recipe.instructions.map(s => `<li>${esc(s)}</li>`).join('')}</ol>`
    : `<p class="no-instructions">No instructions extracted — <a href="${esc(recipe.post_url)}" target="_blank" rel="noopener">view on Instagram</a></p>`;

  /* --- caption (collapsible) --- */
  const captionSection = recipe.caption
    ? `<div class="detail-section">
        <details class="caption-details">
          <summary>Original caption</summary>
          <div class="caption-text">${esc(recipe.caption)}</div>
        </details>
      </div>`
    : '';

  /* --- times row --- */
  const timeCell = (label, val) => {
    const ok = val && val !== 'null' && val !== 'None';
    return `<div class="times-cell">
      <div class="times-cell__label">${label}</div>
      <div class="times-cell__value${ok ? '' : ' times-cell__value--unknown'}">${ok ? esc(val) : 'Unknown'}</div>
    </div>`;
  };

  /* --- servings + skill rows --- */
  const servingsRow = recipe.servings
    ? `<div class="meta-row"><span class="meta-row__label">Servings</span><span class="meta-row__value">${esc(recipe.servings)}</span></div>`
    : '';
  const skillRow = recipe.skill_level && recipe.skill_level !== 'None'
    ? `<div class="meta-row"><span class="meta-row__label">Skill level</span><span class="badge badge-difficulty">${esc(recipe.skill_level)}</span></div>`
    : '';

  /* --- ingredient breakdown groups --- */
  const ingGroups = [
    { label: 'Proteins',       items: recipe.proteins         || [], cls: 'tag-protein'   },
    { label: 'Vegetables',     items: recipe.vegetables       || [], cls: 'tag-vegetable' },
    { label: 'Grains',         items: recipe.grains_starches  || [], cls: 'tag-method'    },
    { label: 'Herbs & Spices', items: recipe.herbs_spices     || [], cls: 'tag-method'    },
  ].filter(g => g.items.length > 0);

  const ingGroupsSection = ingGroups.length > 0
    ? `<div class="detail-section">
        <div class="section-title">🧂 Breakdown</div>
        ${ingGroups.map(g => `
          <div class="tag-label-group">
            <div class="tag-label-group__label">${g.label}</div>
            <div class="tag-label-group__tags">
              ${g.items.map(t => `<span class="tag ${g.cls}">${esc(t.replace(/_/g,' '))}</span>`).join('')}
            </div>
          </div>`).join('')}
      </div>`
    : '';

  /* --- named tag groups (right column) --- */
  const tagGroup = (label, tags, cls) => {
    if (!tags || tags.length === 0) return '';
    return `<div class="tag-label-group">
      <div class="tag-label-group__label">${label}</div>
      <div class="tag-label-group__tags">
        ${tags.map(t => `<span class="tag ${cls}">${esc(t.replace(/_/g,' '))}</span>`).join('')}
      </div>
    </div>`;
  };

  const bestForTags = [...(recipe.occasion || []), ...(recipe.season || [])];
  const cookingTags = [...(recipe.style_tags || []), ...(recipe.cooking_methods || [])];

  const tagsBody = [
    tagGroup('Dietary',   recipe.dietary_tags,   'tag-dietary'),
    tagGroup('Flavour',   recipe.flavor_profile, 'tag-method'),
    tagGroup('Best for',  bestForTags,            'tag-occasion'),
    tagGroup('Health',    recipe.health_tags,     'tag-vegetable'),
    tagGroup('Cooking',   cookingTags,            'tag-method'),
  ].filter(Boolean).join('');

  const tagsSection = tagsBody
    ? `<div class="detail-section">
        <div class="section-title">🏷 Tags</div>
        ${tagsBody}
      </div>`
    : '';

  container.innerHTML = `
    <div class="detail-hero">
      ${heroImg}
      <div class="detail-hero-body">
        <h1 class="detail-title">${esc(titleDisplay)}</h1>
        ${inspirationBadge}
        <div class="detail-meta">${metaBadges}</div>
        <div class="detail-actions">
          <button class="btn btn-fav ${recipe.is_favorite ? 'active' : ''}"
                  id="detail-fav-btn" data-code="${esc(recipe.code)}">
            ${recipe.is_favorite ? '★ Favourited' : '☆ Add to favourites'}
          </button>
          <a class="btn btn-ghost" href="${esc(recipe.post_url)}" target="_blank" rel="noopener">
            📸 View on Instagram
          </a>
        </div>
      </div>
    </div>

    <div class="detail-cols">
      <!-- LEFT: ingredients (with scaling widget) + instructions + caption -->
      <div>
        <div class="detail-section">
          <div class="section-title">🥗 Ingredients</div>
          ${isInspirationOnly ? '' : `
          <div class="tabs">
            <button class="tab-btn tab-btn--active" data-tab="servings">By servings</button>
            <button class="tab-btn"                 data-tab="ingredient">By ingredient</button>
          </div>
          <div id="tab-servings" class="tab-panel tab-panel--active">
            <p class="scale-info">${baseServingsInfo}</p>
            <div class="scale-row">
              <label for="servings-input">Servings</label>
              <input id="servings-input" type="number" min="0.5" step="0.5"
                     placeholder="${recipe.base_servings ?? 'enter amount'}"
                     ${recipe.base_servings == null ? '' : `value="${recipe.base_servings}"`}>
              <span class="scale-factor-badge" id="servings-factor-badge">×1</span>
            </div>
          </div>
          <div id="tab-ingredient" class="tab-panel">
            <div class="scale-row">
              <label for="ingredient-ref">Ingredient</label>
              <select id="ingredient-ref">
                <option value="">Choose…</option>
                ${ingOptions}
              </select>
            </div>
            <div class="scale-row">
              <label for="amount-input">Target amount</label>
              <input id="amount-input" type="number" min="0.01" step="0.01" placeholder="e.g. 500">
              <span class="scale-factor-badge" id="ing-factor-badge">×1</span>
            </div>
          </div>`}
          <ul class="ingredient-list" id="scaled-ingredients">
            ${(recipe.ingredients || []).map(i => `<li>${esc(i)}</li>`).join('')}
          </ul>
        </div>

        <div class="detail-section">
          <div class="section-title">📋 Instructions</div>
          ${instructions}
        </div>

        ${captionSection}
      </div>

      <!-- RIGHT: times + breakdown + tags + notes -->
      <div>
        <div class="detail-section">
          <div class="section-title">⏱ Times &amp; Servings</div>
          <div class="times-grid">
            ${timeCell('Prep',  recipe.prep_time)}
            ${timeCell('Cook',  recipe.cook_time)}
            ${timeCell('Total', recipe.total_time)}
          </div>
          ${servingsRow}
          ${skillRow}
        </div>

        ${ingGroupsSection}

        ${tagsSection}

        <div class="detail-section">
          <div class="section-title">📝 My notes</div>
          <textarea class="notes-area" id="notes-textarea"
                    placeholder="Your personal notes about this recipe…"
                    data-code="${esc(recipe.code)}">${esc(recipe.user_notes ?? '')}</textarea>
          <div class="notes-status" id="notes-status"></div>
        </div>
      </div>
    </div>`;

  attachDetailListeners(recipe);
}

function attachDetailListeners(recipe) {
  /* --- scaling tabs --- */
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-btn--active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('tab-panel--active'));
      btn.classList.add('tab-btn--active');
      document.getElementById(`tab-${btn.dataset.tab}`).classList.add('tab-panel--active');
      updateScaling(recipe);
    });
  });

  /* --- servings input --- */
  document.getElementById('servings-input')?.addEventListener('input', () => updateScaling(recipe));

  /* --- ingredient select + amount --- */
  document.getElementById('ingredient-ref')?.addEventListener('change', () => updateScaling(recipe));
  document.getElementById('amount-input')?.addEventListener('input',  () => updateScaling(recipe));

  /* --- favourite toggle --- */
  document.getElementById('detail-fav-btn')?.addEventListener('click', async () => {
    const btn = document.getElementById('detail-fav-btn');
    const newVal = !recipe.is_favorite;
    recipe = { ...recipe, is_favorite: newVal };
    state.currentRecipe = recipe;
    btn.classList.toggle('active', newVal);
    btn.textContent = newVal ? '★ Favourited' : '☆ Add to favourites';
    await patchRecipe(recipe.code, { is_favorite: newVal });
  });

  /* --- notes textarea (save on blur) --- */
  let notesTimer;
  const notesEl = document.getElementById('notes-textarea');
  const noteStatus = document.getElementById('notes-status');

  notesEl?.addEventListener('input', () => {
    noteStatus.textContent = '';
    clearTimeout(notesTimer);
    notesTimer = setTimeout(async () => {
      await saveNotes(recipe.code, notesEl.value, noteStatus);
    }, 1200);
  });

  notesEl?.addEventListener('blur', async () => {
    clearTimeout(notesTimer);
    await saveNotes(recipe.code, notesEl.value, noteStatus);
  });
}

async function saveNotes(code, value, statusEl) {
  try {
    await patchRecipe(code, { user_notes: value || null });
    statusEl.textContent = '✓ Saved';
    setTimeout(() => { statusEl.textContent = ''; }, 2000);
  } catch {
    statusEl.textContent = '⚠ Could not save';
  }
}

function updateScaling(recipe) {
  const activeTab = document.querySelector('.tab-btn--active')?.dataset.tab || 'servings';
  let factor = 1;

  if (activeTab === 'servings') {
    const target = parseFloat(document.getElementById('servings-input')?.value) || 0;
    if (target > 0 && recipe.base_servings) {
      factor = target / recipe.base_servings;
    }
    const badge = document.getElementById('servings-factor-badge');
    if (badge) badge.textContent = factor === 1 ? '×1' : `×${Math.round(factor * 100) / 100}`;

  } else {
    const selectedIng = document.getElementById('ingredient-ref')?.value;
    const target = parseFloat(document.getElementById('amount-input')?.value) || 0;
    if (selectedIng && target > 0) {
      const qty = extractNumber(selectedIng);
      if (qty) factor = target / qty;
    }
    const badge = document.getElementById('ing-factor-badge');
    if (badge) badge.textContent = factor === 1 ? '×1' : `×${Math.round(factor * 100) / 100}`;
  }

  const ul = document.getElementById('scaled-ingredients');
  if (!ul) return;
  ul.innerHTML = (recipe.ingredients || []).map(ing => {
    const scaled = scaleIngredient(ing, factor);
    const changed = scaled !== ing;
    return `<li class="${changed ? 'scaled' : ''}">${esc(scaled)}</li>`;
  }).join('');
}

// =============================================================================
// Interactions
// =============================================================================

async function toggleFav(code) {
  /* optimistic update in whatever grid is visible */
  const btn = document.querySelector(`.fav-btn[data-code="${CSS.escape(code)}"]`);
  const wasActive = btn?.classList.contains('fav-btn--active');
  const newVal = !wasActive;

  if (btn) {
    btn.classList.toggle('fav-btn--active', newVal);
    btn.textContent = newVal ? '★' : '☆';
  }

  try {
    await patchRecipe(code, { is_favorite: newVal });
    // if we're on favourites view, reload to remove unfavourited cards
    if (state.activeView === 'favourites' && !newVal) {
      await loadFavourites();
    }
  } catch {
    /* revert on failure */
    if (btn) {
      btn.classList.toggle('fav-btn--active', wasActive);
      btn.textContent = wasActive ? '★' : '☆';
    }
    showError();
  }
}

// =============================================================================
// Error banner
// =============================================================================

function showError() {
  document.getElementById('error-banner').hidden = false;
}

// =============================================================================
// Global event delegation
// =============================================================================

let searchTimer;

document.addEventListener('click', (e) => {
  /* recipe card click → detail */
  const card = e.target.closest('.recipe-card');
  if (card && !e.target.closest('[data-action]')) {
    window.location.hash = `#recipe/${card.dataset.code}`;
    return;
  }

  /* favourite toggle on card */
  const favBtn = e.target.closest('[data-action="toggle-fav"]');
  if (favBtn) {
    e.stopPropagation();
    toggleFav(favBtn.dataset.code);
    return;
  }

  /* filter pill */
  const pill = e.target.closest('.pill');
  if (pill) {
    const key = pill.dataset.filter;
    const val = pill.dataset.value;
    state.filters[key] = (state.filters[key] === val) ? '' : val;
    syncPillState();
    loadBrowse();
    return;
  }

  /* clear filters */
  if (e.target.id === 'filters-clear-btn') {
    Object.keys(state.filters).forEach(k => { state.filters[k] = ''; });
    document.getElementById('search-input').value = '';
    syncPillState();
    loadBrowse();
    return;
  }
});

/* search input */
document.getElementById('search-input').addEventListener('input', (e) => {
  state.filters.q = e.target.value.trim();
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => loadBrowse(), DEBOUNCE_MS);
});

/* back button */
document.getElementById('detail-back').addEventListener('click', () => {
  if (history.length > 1) {
    history.back();
  } else {
    window.location.hash = '#browse';
  }
});

/* hash routing */
window.addEventListener('hashchange', () => {
  state.activeView = window.location.hash.startsWith('#favourites') ? 'favourites'
                   : window.location.hash.startsWith('#recipe/')    ? 'recipe'
                   : 'browse';
  handleRoute();
});

// =============================================================================
// Init
// =============================================================================

async function init() {
  try {
    await handleRoute();
  } catch {
    showError();
  }
}

document.addEventListener('DOMContentLoaded', init);
</script>
